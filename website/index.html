<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 40px;
    }

    .container {
        max-width: 500px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        background: #f8f8f8;
        border-radius: 5px;
        white-space: pre-wrap;
    }

    .success {
        color: green;
    }

    .error {
        color: red;
    }
</style>

</head>

    type="text"
